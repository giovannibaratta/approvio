databaseChangeLog:
  - changeSet:
      id: 20260509143200-create-audit-logs-table
      author: giovannibaratta
      changes:
        - createTable:
            tableName: audit_logs
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: audit_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: entity_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: entity_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: actor_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: actor_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: JSONB
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP(6)
                  constraints:
                    nullable: false
        - createIndex:
            tableName: audit_logs
            indexName: idx_audit_logs_actor_id_created_at
            columns:
              - column:
                  name: actor_id
              - column:
                  name: created_at
                  descending: true
        - createIndex:
            tableName: audit_logs
            indexName: idx_audit_logs_entity_id_created_at
            columns:
              - column:
                  name: entity_id
              - column:
                  name: created_at
                  descending: true
        - sql:
            sql: CREATE INDEX idx_audit_logs_created_at_brin ON audit_logs USING brin (created_at);
