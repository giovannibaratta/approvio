databaseChangeLog:
  - changeSet:
      id: 20260509143200-create-audit-logs-table
      author: giovannibaratta
      changes:
        - createTable:
            tableName: audit_logs
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: audit_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: entity_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: entity_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: actor_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: actor_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: JSONB
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP(6)
                  constraints:
                    nullable: false
